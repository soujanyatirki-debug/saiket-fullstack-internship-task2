<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopEase - E-Commerce Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--Bootstrap CSS for responsive website -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS to add styles -->
  <link rel="stylesheet" href="index.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">ShopEase</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#products">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
      <button class="btn btn-outline-light ms-3" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    </div>
  </div>
</nav>
<section class="hero">
  <div class="container">
    <h1>Welcome to ShopEase</h1>
    <p>Your one-stop online shopping destination</p>
    <a href="#products" class="btn btn-light btn-lg">Shop Now</a>
  </div>
</section>
<section id="products" class="container my-5">
  <h2 class="text-center mb-4">Featured Products</h2>
  <div class="row">

    <div class="col-md-4 mb-4">
      <div class="card product-card">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Smart Watch</h5>
          <p class="card-text">$99</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>
    <div class="col-md-4 mb-4">
      <div class="card product-card">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Headphones</h5>
          <p class="card-text">$49</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>
    <div class="col-md-4 mb-4">
      <div class="card product-card">
        <img src="https://via.placeholder.com/300" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Shoes</h5>
          <p class="card-text">$79</p>
          <button class="btn btn-primary">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</section>
<section id="contact" class="container my-5">
  <h2 class="text-center mb-4">Contact Us</h2>

  <form id="contactForm">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" id="name">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="email">
    </div>
    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" id="message"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Submit</button>
  </form>
  <div id="formMessage" class="mt-3"></div>
</section>
<footer>
  <p>© 2026 ShopEase. All Rights Reserved.</p>
</footer>
<!-- Bootstrap JS to add interactive features -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS to handle form submission and dark mode toggle -->
<script src="index.js"></script>

</body>
</html>
